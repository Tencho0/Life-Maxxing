<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LifeMaxxing — Home directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap&subset=cyrillic,latin" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #d9d9dc; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="lib/ui.jsx"></script>
<script type="text/babel" src="lib/data.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── Shared bottom nav ─────────────────────────────────────────────
function BottomNav({ active = 'home' }) {
  const items = [
    { id:'home', icon:'home', label:'Начало' },
    { id:'stats', icon:'chart', label:'Графики' },
    { id:'plus', icon:'plus', label:'' },
    { id:'memories', icon:'camera', label:'Спомени' },
    { id:'more', icon:'dots', label:'Още' },
  ];
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-around',
      padding:'8px 10px 6px', background:'rgba(13,14,18,0.92)', borderTop:`1px solid ${T.border}`,
      backdropFilter:'blur(12px)' }}>
      {items.map(it => it.id === 'plus' ? (
        <div key="plus" style={{ width:52, height:52, borderRadius:18, background:T.accent,
          display:'flex', alignItems:'center', justifyContent:'center', marginTop:-22,
          boxShadow:`0 8px 22px rgba(106,168,255,0.45)` }}>
          <Icon name="plus" size={26} color="#0C0D11" sw={2.4}/>
        </div>
      ) : (
        <div key={it.id} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3, width:58 }}>
          <Icon name={it.icon} size={22} color={active === it.id ? T.accent : T.textFaint}/>
          <span style={{ fontFamily:FS, fontSize:10, color: active === it.id ? T.accent : T.textFaint }}>{it.label}</span>
        </div>
      ))}
    </div>
  );
}

function Screen({ children }) {
  return <div style={{ minHeight:'100%', background:T.bg, fontFamily:FS, color:T.text,
    display:'flex', flexDirection:'column' }}>{children}</div>;
}

function Header({ greeting }) {
  return (
    <div style={{ padding:'14px 18px 8px', display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
      <div>
        <div style={{ fontSize:13, color:T.textDim, fontFamily:FM, letterSpacing:0.3 }}>събота · 31 май</div>
        <div style={{ fontSize:24, fontWeight:700, letterSpacing:-0.4, marginTop:2 }}>{greeting}</div>
      </div>
      <div style={{ display:'flex', gap:8 }}>
        <div style={{ width:38, height:38, borderRadius:12, background:T.card, border:`1px solid ${T.border}`,
          display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name="search" size={19} color={T.textDim}/></div>
        <div style={{ width:38, height:38, borderRadius:12, background:T.card, border:`1px solid ${T.border}`,
          display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name="calendar" size={19} color={T.textDim}/></div>
      </div>
    </div>
  );
}

// Quick-log horizontal strip
function QuickStrip() {
  return (
    <div style={{ padding:'6px 0 4px' }}>
      <div style={{ display:'flex', gap:10, overflowX:'auto', padding:'4px 18px 10px' }}>
        {QUICK.map(q => (
          <div key={q.id} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:6, flexShrink:0, width:58 }}>
            <div style={{ width:54, height:54, borderRadius:17, background:T.card, border:`1px solid ${T.border}`,
              display:'flex', alignItems:'center', justifyContent:'center' }}>
              <Icon name={q.icon} size={23} color={q.color}/>
            </div>
            <span style={{ fontSize:10.5, color:T.textDim, whiteSpace:'nowrap' }}>{q.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ════════════════ DIRECTION A — "Поток" (Today feed) ════════════════ */
function HomeA() {
  const macro = [{c:T.green,v:DAILY.steps},{}];
  return (
    <Screen>
      <Header greeting="Добър вечер, Мартин"/>
      <div style={{ padding:'2px 18px 4px' }}>
        <Eyebrow>Бързо логване</Eyebrow>
      </div>
      <QuickStrip/>
      <div style={{ padding:'0 18px 18px', display:'flex', flexDirection:'column', gap:12 }}>
        {/* Hero rings */}
        <div style={{ display:'flex', gap:12 }}>
          <Card style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
            <Ring value={8} max={10} color={T.accent} size={92}>
              <span style={{ fontFamily:FM, fontSize:26, fontWeight:600 }}>8</span>
              <span style={{ fontSize:10, color:T.textFaint }}>/ 10</span>
            </Ring>
            <span style={{ fontSize:12.5, color:T.textDim }}>Настроение</span>
          </Card>
          <Card style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
            <Ring value={9420} max={10000} color={T.purple} size={92}>
              <span style={{ fontFamily:FM, fontSize:19, fontWeight:600 }}>9 420</span>
              <span style={{ fontSize:10, color:T.textFaint }}>крачки</span>
            </Ring>
            <span style={{ fontSize:12.5, color:T.textDim }}>94% от целта</span>
          </Card>
        </div>
        {/* Balance */}
        <Card style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <Eyebrow>Баланс · май</Eyebrow>
            <div style={{ fontFamily:FM, fontSize:24, fontWeight:600, color:T.green, marginTop:4 }}>+1 190 лв.</div>
            <div style={{ fontSize:11.5, color:T.textDim, marginTop:2 }}>3 280 приход · 2 090 разход</div>
          </div>
          <Sparkline data={DAYS30.map(d=>d.income-d.expense+200)} w={96} h={46} color={T.green}/>
        </Card>
        {/* Calories */}
        <Card>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
            <Eyebrow>Калории днес</Eyebrow>
            <span style={{ fontFamily:FM, fontSize:13, color:T.textDim }}>2 180 / 2 400</span>
          </div>
          <div style={{ height:8, borderRadius:5, background:'rgba(255,255,255,0.07)', marginTop:10, overflow:'hidden', display:'flex' }}>
            <div style={{ width:'40%', background:T.amber }}/>
            <div style={{ width:'34%', background:T.accent }}/>
            <div style={{ width:'17%', background:T.pink }}/>
          </div>
          <div style={{ display:'flex', gap:14, marginTop:10, fontSize:11.5, color:T.textDim }}>
            <span><b style={{color:T.amber}}>П</b> 142г</span>
            <span><b style={{color:T.accent}}>В</b> 198г</span>
            <span><b style={{color:T.pink}}>М</b> 71г</span>
          </div>
        </Card>
        {/* BP small + daily prompt */}
        <div style={{ display:'flex', gap:12 }}>
          <Card style={{ flex:1 }}>
            <Eyebrow>Кръвно · 08:20</Eyebrow>
            <div style={{ fontFamily:FM, fontSize:22, fontWeight:600, marginTop:4 }}>124/78</div>
            <div style={{ fontSize:11.5, color:T.textDim, marginTop:2 }}>♥ пулс 71</div>
          </Card>
          <Card hi style={{ flex:1, borderColor:'rgba(106,168,255,0.4)', display:'flex', flexDirection:'column', justifyContent:'space-between' }}>
            <Eyebrow style={{ color:T.accent }}>Дневник</Eyebrow>
            <div style={{ fontSize:13, fontWeight:600, lineHeight:1.3 }}>Попълни деня си</div>
            <div style={{ display:'flex', alignItems:'center', gap:5, fontSize:11.5, color:T.accent }}>
              Отвори <Icon name="arrowR" size={13} color={T.accent}/>
            </div>
          </Card>
        </div>
      </div>
      <div style={{ flex:1 }}/>
      <BottomNav active="home"/>
    </Screen>
  );
}

/* ════════════════ DIRECTION B — "Бенто" (Command grid) ════════════════ */
function Tile({ children, style, span }) {
  return <Card style={{ gridColumn: span ? 'span 2' : 'auto', minHeight:0, ...style }}>{children}</Card>;
}
function HomeB() {
  return (
    <Screen>
      <Header greeting="Здравей, Мартин"/>
      <QuickStrip/>
      <div style={{ padding:'2px 18px 18px', display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
        <Tile span style={{ background:'linear-gradient(135deg,#1a2435,#14161d)', borderColor:'rgba(106,168,255,0.3)' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div>
              <Eyebrow style={{ color:T.accent }}>Серия · дневник</Eyebrow>
              <div style={{ fontFamily:FM, fontSize:30, fontWeight:600, marginTop:4 }}>24 <span style={{ fontSize:14, color:T.textDim }}>дни</span></div>
            </div>
            <Sparkline data={DAYS30.map(d=>d.mood)} w={110} h={48} color={T.accent}/>
          </div>
        </Tile>
        {/* Mood */}
        <Tile style={{ background:T.accentSoft, borderColor:'rgba(106,168,255,0.3)' }}>
          <Eyebrow style={{ color:T.accent }}>Настроение</Eyebrow>
          <div style={{ fontFamily:FM, fontSize:44, fontWeight:600, lineHeight:1, marginTop:8, color:T.accent }}>8</div>
          <div style={{ fontSize:11.5, color:T.textDim, marginTop:4 }}>добър ден</div>
        </Tile>
        {/* Steps */}
        <Tile style={{ display:'flex', alignItems:'center', gap:12 }}>
          <Ring value={9420} max={10000} color={T.purple} size={62} sw={7}>
            <Icon name="steps" size={20} color={T.purple}/>
          </Ring>
          <div>
            <div style={{ fontFamily:FM, fontSize:18, fontWeight:600 }}>9 420</div>
            <div style={{ fontSize:11, color:T.textDim }}>крачки</div>
          </div>
        </Tile>
        {/* Balance */}
        <Tile style={{ background:T.greenSoft, borderColor:'rgba(95,208,138,0.3)' }}>
          <Eyebrow style={{ color:T.green }}>Баланс май</Eyebrow>
          <div style={{ fontFamily:FM, fontSize:22, fontWeight:600, color:T.green, marginTop:6 }}>+1 190</div>
          <Sparkline data={DAYS30.map(d=>d.income-d.expense+200)} w={120} h={28} color={T.green} fill={false}/>
        </Tile>
        {/* BP */}
        <Tile>
          <Eyebrow>Кръвно</Eyebrow>
          <div style={{ fontFamily:FM, fontSize:22, fontWeight:600, marginTop:6 }}>124<span style={{color:T.textFaint}}>/</span>78</div>
          <div style={{ fontSize:11, color:T.textDim, marginTop:3 }}>♥ 71 · 08:20</div>
        </Tile>
        {/* Calories */}
        <Tile span>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div>
              <Eyebrow>Калории днес</Eyebrow>
              <div style={{ fontFamily:FM, fontSize:22, fontWeight:600, marginTop:4 }}>2 180 <span style={{ fontSize:12, color:T.textFaint }}>/ 2 400 kcal</span></div>
            </div>
            <div style={{ display:'flex', gap:14, fontSize:12, color:T.textDim, textAlign:'center' }}>
              <div><div style={{color:T.amber, fontFamily:FM, fontSize:16}}>142</div>прот.</div>
              <div><div style={{color:T.accent, fontFamily:FM, fontSize:16}}>198</div>въгл.</div>
              <div><div style={{color:T.pink, fontFamily:FM, fontSize:16}}>71</div>мазн.</div>
            </div>
          </div>
        </Tile>
      </div>
      <div style={{ flex:1 }}/>
      <BottomNav active="home"/>
    </Screen>
  );
}

/* ════════════════ DIRECTION C — "Поток на деня" (Big actions + timeline) ════════════════ */
function BigAction({ q }) {
  return (
    <div style={{ flex:1, background:T.card, border:`1px solid ${T.border}`, borderRadius:18, padding:'14px 14px',
      display:'flex', flexDirection:'column', gap:18, minHeight:84 }}>
      <div style={{ width:40, height:40, borderRadius:13, background:'rgba(255,255,255,0.05)',
        display:'flex', alignItems:'center', justifyContent:'center' }}>
        <Icon name={q.icon} size={22} color={q.color}/>
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontSize:14, fontWeight:600 }}>{q.label}</span>
        <Icon name="plus" size={17} color={T.textFaint}/>
      </div>
    </div>
  );
}
function RailCard({ label, value, unit, data, color }) {
  return (
    <Card style={{ width:138, flexShrink:0, padding:14 }}>
      <Eyebrow>{label}</Eyebrow>
      <div style={{ fontFamily:FM, fontSize:20, fontWeight:600, marginTop:5 }}>{value}<span style={{fontSize:11, color:T.textFaint}}> {unit}</span></div>
      <div style={{ marginTop:10 }}><Sparkline data={data} w={110} h={32} color={color}/></div>
    </Card>
  );
}
function TimelineItem({ icon, color, title, sub, meta, last }) {
  return (
    <div style={{ display:'flex', gap:12 }}>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
        <div style={{ width:34, height:34, borderRadius:11, background:T.card, border:`1px solid ${T.border}`,
          display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name={icon} size={17} color={color}/></div>
        {!last && <div style={{ width:1.5, flex:1, background:T.border, marginTop:2, minHeight:14 }}/>}
      </div>
      <div style={{ flex:1, paddingBottom:last?0:14 }}>
        <div style={{ display:'flex', justifyContent:'space-between' }}>
          <span style={{ fontSize:13.5, fontWeight:600 }}>{title}</span>
          <span style={{ fontFamily:FM, fontSize:11.5, color:T.textFaint }}>{meta}</span>
        </div>
        <div style={{ fontSize:12, color:T.textDim, marginTop:1 }}>{sub}</div>
      </div>
    </div>
  );
}
function HomeC() {
  return (
    <Screen>
      <Header greeting="31 май, събота"/>
      <div style={{ padding:'2px 18px 6px' }}><Eyebrow>Логни за 2 докосвания</Eyebrow></div>
      <div style={{ padding:'4px 18px 14px', display:'flex', flexDirection:'column', gap:10 }}>
        <div style={{ display:'flex', gap:10 }}>
          <BigAction q={QUICK[0]}/><BigAction q={QUICK[1]}/>
        </div>
        <div style={{ display:'flex', gap:10 }}>
          <BigAction q={QUICK[2]}/><BigAction q={QUICK[3]}/>
        </div>
      </div>
      <div style={{ padding:'0 0 6px 18px' }}><Eyebrow>Тази седмица</Eyebrow></div>
      <div style={{ display:'flex', gap:10, overflowX:'auto', padding:'6px 18px 14px' }}>
        <RailCard label="Настроение" value="7.4" unit="ср." data={last7.map(d=>d.mood)} color={T.accent}/>
        <RailCard label="Крачки" value="8.3к" unit="ср." data={last7.map(d=>d.steps)} color={T.purple}/>
        <RailCard label="Разход" value="612" unit="лв." data={last7.map(d=>d.expense)} color={T.red}/>
        <RailCard label="Пулс" value="73" unit="ср." data={last7.map(d=>d.pulse)} color={T.pink}/>
      </div>
      <div style={{ padding:'0 18px 8px' }}><Eyebrow>Дневен поток</Eyebrow></div>
      <div style={{ padding:'4px 18px 14px' }}>
        <TimelineItem icon="pulse" color={T.pink} title="Кръвно 124/78" sub="Сутрин след събуждане · пулс 71" meta="08:20"/>
        <TimelineItem icon="food" color={T.amber} title="Закуска" sub="Овесена каша с банан · 420 kcal" meta="08:10"/>
        <TimelineItem icon="run" color={T.green} title="Тренировка — гръб" sub="65 мин · висока интензивност" meta="18:30"/>
        <TimelineItem icon="expense" color={T.red} title="Гориво OMV" sub="Транспорт · с карта" meta="−120 лв." last/>
      </div>
      <div style={{ flex:1 }}/>
      <BottomNav active="home"/>
    </Screen>
  );
}

// ── Canvas ────────────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas>
      <DCSection id="homes" title="LifeMaxxing · Начален екран" subtitle="3 посоки — тъмен, data-driven дашборд · български · Android">
        <DCArtboard id="a" label="A · Поток — рингове + карти" width={412} height={892}>
          <AndroidDevice dark><HomeA/></AndroidDevice>
        </DCArtboard>
        <DCArtboard id="b" label="B · Бенто — плътна решетка" width={412} height={892}>
          <AndroidDevice dark><HomeB/></AndroidDevice>
        </DCArtboard>
        <DCArtboard id="c" label="C · Поток на деня — действия + timeline" width={412} height={892}>
          <AndroidDevice dark><HomeC/></AndroidDevice>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
