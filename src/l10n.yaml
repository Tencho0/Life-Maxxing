# gen-l10n config. ARB files live in lib/l10n; the generated AppLocalizations is
# written next to them (committed, like drift's *.g.dart) and a non-nullable
# `of(context)` getter is used so `context.l10n` never needs a `!`.
arb-dir: lib/l10n
template-arb-file: app_en.arb
output-dir: lib/l10n
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
